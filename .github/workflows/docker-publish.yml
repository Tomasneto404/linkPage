name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables building for arm64 on the amd64 GitHub runner via QEMU emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives tags automatically:
      #   push to main      → tomasneto26/linkpage:latest
      #   push tag v1.2.3   → tomasneto26/linkpage:1.2.3 + tomasneto26/linkpage:latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tomasneto26/linkpage
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs using the GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
