<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkPage</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tabs-wrap {
      position: sticky;
      top: var(--header-h);
      background: rgba(255,255,255,0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 40;
      transition: background var(--transition);
    }
    [data-theme="dark"] .tabs-wrap { background: rgba(28,28,30,0.85); }

    .tabs {
      max-width: 1120px;
      margin: 0 auto;
      padding: 8px 22px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 980px;
      border: 1px solid transparent;
      background: none;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      letter-spacing: -0.01em;
    }
    .tab:hover { background: var(--surface-3); color: var(--text); }
    .tab.active {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }

    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tab-count {
      font-size: 0.72rem;
      opacity: 0.75;
      font-weight: 600;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 22px 64px;
    }

    .link-card { text-decoration: none; display: flex; }
    .link-card:hover { text-decoration: none; }

    .link-arrow {
      flex-shrink: 0;
      color: var(--text-muted);
      opacity: 0;
      align-self: center;
      transition: opacity var(--transition), transform var(--transition);
    }
    .link-card:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    .admin-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 980px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .admin-btn:hover { background: var(--surface-3); color: var(--text); border-color: transparent; }
  </style>
</head>
<body>

<!-- Public password gate — shown by app.js if a password is configured -->
<div class="gate hidden" id="publicGate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Protected</h1>
    <p>Enter the password to view links.</p>
    <form id="publicGateForm">
      <input type="password" id="publicPasswordInput"
             placeholder="Enter password…" autocomplete="current-password" required />
      <div class="form-error hidden" id="publicGateError">Incorrect password.</div>
      <button type="submit" class="btn btn-primary gate-submit">View Links</button>
    </form>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="logo" id="headerLogo">
      <img id="brandImg" class="logo-img hidden" alt="Logo" />
      <span id="brandText" style="display:flex;align-items:center;gap:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        LinkPage
      </span>
    </div>

    <div class="search-wrap" style="flex:1;max-width:320px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="search" placeholder="Search links…" autocomplete="off" />
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="hidden"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>

    <a href="/admin" class="admin-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Admin
    </a>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-group="all">All</button>
  </div>
</div>

<main>
  <div class="empty-state hidden" id="emptyState">
    <div class="empty-icon" id="emptyIcon"></div>
    <p class="empty-title" id="emptyMsg"></p>
    <p class="empty-sub hidden" id="emptySubtext"></p>
  </div>
  <div class="links-grid" id="linksGrid"></div>
</main>

<script src="app.js"></script>
</body>
</html>
